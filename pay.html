<!payment_allsans>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>WEB ALL SANS RE4L 🤑</title>

<style>
*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Arial,sans-serif;
}

body{
display:flex;
justify-content:center;
align-items:center;
min-height:100vh;
background:url('36911.png');
background-size:cover;
background-position:center;
overflow:hidden;
}

body::before{
content:'';
position:absolute;
width:100%;
height:100%;
background:rgba(0,0,0,0.75);
backdrop-filter:blur(4px);
}

.card{
position:relative;
width:350px;
padding:25px;
border-radius:25px;
background:rgba(20,0,0,.7);
border:2px solid red;
box-shadow:0 0 30px red;
text-align:center;
z-index:1;
}

.title{
font-size:35px;
font-weight:bold;
color:white;
text-shadow:0 0 20px red;
margin-bottom:20px;
}

.box{
background:rgba(255,0,0,.1);
padding:15px;
border-radius:15px;
border:1px solid red;
margin-top:15px;
}

)
h2{
color:white;
margin-bottom:10px;
}

.number{
color:#ff4d4d;
font-size:22px;
font-weight:bold;
}

button{
margin-top:15px;
width:100%;
padding:12px;
border:none;
border-radius:15px;
background:red;
color:white;
font-size:17px;
font-weight:bold;
cursor:pointer;
transition:.3s;
}

button:hover{
box-shadow:0 0 20px red;
transform:scale(1.03);
}

.qris{
width:170px;
border-radius:15px;
cursor:pointer;
margin-top:10px;
transition:.3s;
box-shadow:0 0 20px red;
}

.qris:hover{
transform:scale(1.05);
}

.popup{
display:none;
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
background:rgba(0,0,0,.9);
justify-content:center;
align-items:center;
z-index:999;
}

.popup img{
width:400px;
max-width:90%;
border-radius:20px;
box-shadow:0 0 30px red;
animation:zoom .3s;
}

@keyframes zoom{
from{
transform:scale(.5);
}
to{
transform:scale(1);
}
}
</style>
</head>
<body>

<div class="card">

<div class="title">
ALL SANS RE4L
</div>

<div class="box">
<h2>DANA</h2>
<div class="number" id="dana">083140875103</div>

<button onclick="copyDana()">
SALIN NOMOR DANA
</button>
</div>

<div class="box">
<h2>QRIS</h2>

<img src="https://files.catbox.moe/w48p01.jpeg"
class="qris"
onclick="openQris()">

<p style="color:white;margin-top:10px;">
Klik QRIS untuk memperbesar
</p>
</div>
</div>

<div class="popup" id="popup" onclick="closeQris()">
<img src="https://files.catbox.moe/w48p01.jpeg">
</div>

<script>
function copyDana(){
navigator.clipboard.writeText("083140875103");
alert("Nomor DANA berhasil disalin!");
}

function openQris(){
document.getElementById("popup").style.display="flex";
}

function closeQris(){
document.getElementById("popup").style.display="none";
}
</script>

</body>
</html>
